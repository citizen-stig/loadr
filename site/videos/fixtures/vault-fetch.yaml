# vault-fetch demo — pull a KV v2 secret from a real HashiCorp Vault at run
# start, then spend the fetched fields as request credentials.
#
# Backend: docker run -d --name rig-vault -p 8200:8200 \
#            -e VAULT_DEV_ROOT_TOKEN_ID=demo-root hashicorp/vault
# Seed:    docker exec -e VAULT_ADDR=http://127.0.0.1:8200 -e VAULT_TOKEN=demo-root \
#            rig-vault vault kv put secret/demo api_key=sekret123 db_password=hunter2
#
# HONEST CAVEAT: `vault-fetch` is a native SERVICE plugin (FfiService:
# start(config) -> bound addr / stop()). loadr 1.24.1 loads service plugins from
# `plugins:` but the run path never calls start() (crates/loadr-cli/src/commands/
# run.rs collects services and only stop()s them), so the plugin's local secret
# endpoint (bind 127.0.0.1:6491) never comes up and a `socket:` draw against it
# gets connection-refused — verified empirically. The `secrets: { plugin: … }`
# binding its docs describe is not in the 1.24.1 plan schema either
# (docs/src/plugins/vault-fetch.md is marked "planned").
#
# So this plan demos the SAME flow the plugin automates — token auth to Vault,
# one KV v2 read of `secret/demo`, then the fetched fields spent as credentials
# — doing the Vault HTTP API calls as plain HTTP steps against the real dev
# Vault. The plugins: entry still loads the installed vault-fetch artifact
# (proving install + ABI), it just cannot serve the secret socket yet.
name: vault-fetch-demo
description: Fetch a KV v2 secret from HashiCorp Vault, then spend it as request credentials

plugins:
  # Loads the installed native plugin (kind=service). Config matches what the
  # plugin needs once core starts services: it would log in with the token, read
  # secret/demo ONCE, and serve the cached fields to every VU on 127.0.0.1:6491
  # (write a field name + newline, read the value back; `*` returns the whole
  # secret as JSON).
  - name: vault-fetch
    config:
      addr: http://127.0.0.1:8200      # dev Vault; real setups use https://
      path: secret/data/demo           # KV v2 read path (data/ infix)
      auth:
        token: demo-root               # dev root token; real plans use ${env.VAULT_TOKEN}
      bind: 127.0.0.1:6491             # fixed local secret endpoint

scenarios:
  secret_consumers:
    executor: constant-vus
    vus: 3
    duration: 6s
    flow:
      # The read the plugin would run centrally at start(): GET the KV v2 path
      # with X-Vault-Token, pull the secret fields out of data.data.
      - request:
          name: fetch KV v2 secret from Vault
          url: http://127.0.0.1:8200/v1/secret/data/demo
          headers:
            X-Vault-Token: demo-root
          extract:
            - { type: jsonpath, name: api_key, expression: "$.data.data.api_key" }
            - { type: jsonpath, name: db_password, expression: "$.data.data.db_password" }
          checks:
            - { type: status, equals: 200 }
            - { type: jsonpath, expression: "$.data.data.api_key", equals: "sekret123" }
      # Spend the fetched api_key as a Bearer credential on the API under test.
      - request:
          name: authed GET /bearer with fetched api_key
          url: http://localhost:8090/bearer
          headers:
            Authorization: "Bearer ${api_key}"
          checks:
            - { type: status, equals: 200 }
            - { type: body_contains, value: "sekret123" }
      # And the db_password in a login-shaped POST body (httpbin echoes it back).
      - request:
          name: login POST with fetched db_password
          method: POST
          url: http://localhost:8090/anything/login
          body:
            json:
              user: demo
              password: "${db_password}"
          checks:
            - { type: status, equals: 200 }
            - { type: body_contains, value: "hunter2" }

thresholds:
  checks: [ "rate>0.99" ]
