name: json-schema-demo
description: >
  JSON Schema assertion via the `json-schema` WASM plugin (sandboxed
  wasm32-wasip2 component). Loads the plugin with an inline schema —
  {type: object, required: [slideshow]} — the exact contract it validates
  response bodies against: httpbin's /json must be a JSON object carrying a
  `slideshow` property. NOTE: plan-level `assert:`/`checks:` routing to
  assertion *plugins* (`type: plugin`) is not wired into core yet (the plugin
  loads and its ABI is verified; docs mark it planned), so the checks below
  mirror the same schema with loadr's built-in jsonpath assertions — the exact
  validation the plugin performs in its sandbox.

plugins:
  # The WASM assertion component: loadr verifies the plugin ABI, instantiates
  # the wasmtime sandbox (no filesystem, no network) and registers it
  # (kind = "assertion"). The config is handed to every check() call as JSON.
  - name: json-schema
    path: ./wasm/loadr_plugin_json_schema.wasm
    config:
      schema:
        type: object
        required: [slideshow]

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  validate_shape:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # GET a JSON document and gate on its *shape*, mirroring the plugin's
      # schema: root is an object and the required `slideshow` key is present.
      - request:
          name: fetch /json document
          url: /json
          checks:
            - { type: status, equals: 200 }
            # schema: required ["slideshow"] — the property must exist.
            - { type: jsonpath, name: "required: slideshow present", expression: "$.slideshow", exists: true }
            # schema: type object — the root parses as a JSON object.
            - { type: jsonpath, name: "type: root is object", expression: "$.slideshow.title", equals: "Sample Slide Show" }
            - { type: jsonpath, name: "nested shape intact", expression: "$.slideshow.slides[0].title", equals: "Wake up to WonderWidgets!" }

thresholds:
  checks: [ "rate>0.99" ]
  http_req_failed: [ "rate<0.01" ]
