# k8s-metrics demo — poll the Kubernetes metrics.k8s.io API for pod CPU/memory
# while an HTTP load runs, so target resource usage lines up with the load.
#
# Backend (leave running):
#   python3 /tmp/loadr-demo/mock-k8s-metrics.py   # 127.0.0.1:9996 — mock
#     metrics.k8s.io API: GET /apis/metrics.k8s.io/v1beta1/namespaces/{ns}/pods
#     returns a PodMetricsList (2 pods, containers[].usage.cpu/.memory as k8s
#     quantity strings like "260m" / "130Mi"), the exact shape the plugin parses.
#   go-httpbin on localhost:8090 — the system under load.
#
# HONEST CAVEAT — k8s-metrics is a native SERVICE plugin (FfiService:
# start(config_json) -> bound collector addr / stop()). loadr 1.24.1 loads
# service plugins declared under `plugins:` but the local run path never calls
# their start() (only stop(); verified: the `bind` port below never opens
# during a run), and the `observe:` block in the 1.24.1 schema only accepts
# `type: prometheus` — plugin collector sources are a later phase of the
# observe RFC. So the plugin's poller and snapshot endpoint don't come up yet.
# The plugins: entry below still exercises the real `loadr plugin install
# k8s-metrics` artifact (native ABI load succeeds or the run aborts), and its
# config documents the intended collector wiring; the `metrics_scraper`
# scenario then performs the SAME scrape loop the plugin's start() would spawn:
# GET the namespaced pod-metrics endpoint (with labelSelector) every 2s and
# validate the PodMetricsList payload the plugin turns into the
# k8s_pod_cpu_cores / k8s_pod_mem_bytes / k8s_scrapes series.
name: k8s-metrics-demo
description: pod CPU/memory from metrics.k8s.io scraped alongside an HTTP load

plugins:
  # Loads the installed native plugin (kind=service) — proves install + ABI
  # load. Config is what the collector will consume once core starts service
  # plugins (JSON at the ABI boundary), matching the mock API on :9996.
  - name: k8s-metrics
    config:
      api_url: http://127.0.0.1:9996     # off-cluster override (in-cluster default: https://kubernetes.default.svc)
      namespace: app                     # scrape pods in this namespace
      selector: app=api                  # labelSelector narrowing the pods
      interval_ms: 2000                  # one scrape per 2s tick
      bind: 127.0.0.1:6497               # local snapshot endpoint (fixed for the demo)

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  # The scrape loop the plugin's poller would run: hit the exact metrics.k8s.io
  # pods endpoint (namespace + encoded labelSelector) on the 2s interval and
  # check the PodMetricsList shape — pods under metadata.name, per-container
  # usage quantities that sum into the per-pod gauge series.
  metrics_scraper:
    executor: constant-vus
    vus: 1
    duration: 6s
    flow:
      - request:
          name: scrape pod metrics (metrics.k8s.io)
          url: http://127.0.0.1:9996/apis/metrics.k8s.io/v1beta1/namespaces/app/pods?labelSelector=app%3Dapi
          headers:
            Accept: application/json
          extract:
            # k8s quantity strings, e.g. "260m" CPU / "130Mi" memory — what the
            # plugin parses into cores / bytes for k8s_pod_cpu_cores|mem_bytes.
            - { type: jsonpath, name: pod0_cpu, expression: "$.items[0].containers[0].usage.cpu" }
            - { type: jsonpath, name: pod0_mem, expression: "$.items[0].containers[0].usage.memory" }
          checks:
            - { type: status, equals: 200 }
            - { type: body_contains, name: is a PodMetricsList, value: PodMetricsList }
            - { type: body_contains, name: pod api-0 present, value: api-0 }
            - { type: body_contains, name: pod api-1 present, value: api-1 }
      - think_time: { type: constant, duration: 2s }   # the plugin's interval_ms

  # The load whose timeline the pod series would overlay.
  api_load:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      - request:
          name: httpbin get
          url: /get
          checks: [ { type: status, equals: 200 } ]
      - request:
          name: httpbin json
          url: /json
          checks: [ { type: status, equals: 200 } ]
      - think_time: { type: constant, duration: 200ms }

thresholds:
  checks: [ "rate>0.99" ]
  http_req_failed: [ "rate<0.01" ]
