name: cloudwatch-demo
description: stream per-second snapshots to CloudWatch PutMetricData (SigV4-signed)

# Credentials come from the standard AWS env vars (SigV4 signing):
#   AWS_ACCESS_KEY_ID=demo AWS_SECRET_ACCESS_KEY=demo loadr run cloudwatch.yaml
# The `endpoint` override points PutMetricData at the local mock sink instead
# of https://monitoring.<region>.amazonaws.com/ — drop it for a real run.
# Each one-second snapshot becomes one signed PutMetricData POST: counters as
# Count units, gauges/rates as plain values, trends per quantile (.avg, .p95…).

plugins:
  - name: cloudwatch
    config:
      region: us-east-1
      namespace: loadr/demo
      endpoint: http://127.0.0.1:9999
      dimensions:
        env: demo
        service: httpbin

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  api:
    executor: constant-vus
    vus: 5
    duration: 6s
    flow:
      - request:
          name: get
          url: /get
          checks: [ { type: status, equals: 200 } ]
      - request:
          name: json
          url: /json
          checks: [ { type: status, equals: 200 } ]

thresholds:
  checks: [ "rate>0.99" ]
