name: css-select-demo
description: >-
  WASM extractor plugin `css-select`: pull text out of a rendered HTML page by
  CSS selector. The plugin (config `{selector, attr}`) is installed and loaded
  by the run; core `extract: { type: plugin }` wiring is still marked planned,
  so the identical selector is exercised here via the built-in css extractor.

# Loads the WASM component at run start (kind: extractor, type: wasm).
# Config mirrors the plugin contract: selector (required), attr (optional).
plugins:
  - name: css-select
    config: { selector: "h1" }

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  scrape:
    executor: constant-vus
    vus: 3
    duration: 6s
    flow:
      - request:
          name: html page
          url: /html
          checks:
            - { type: status, equals: 200 }
          extract:
            # Same selector the plugin is configured with, run through the
            # built-in CSS engine; the chain check verifies the extraction.
            - chain: page_title
              css: "h1"
              check: { equals: "Herman Melville - Moby-Dick" }
      - request:
          name: report scraped title
          method: POST
          url: http://127.0.0.1:9999/scraped
          body:
            json: { title: "${page_title}" }
          checks:
            - { type: status, equals: 200 }

thresholds:
  checks: [ "rate>0.99" ]
