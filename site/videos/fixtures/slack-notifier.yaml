name: slack-demo
description: post the run summary + threshold breaches to a Slack webhook

outputs:
  - type: plugin
    name: slack-notifier
    config:
      webhook_url: http://127.0.0.1:9999/slack-hook

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  api:
    executor: constant-vus
    vus: 5
    duration: 6s
    flow:
      - request:
          name: get
          url: /get
          checks: [ { type: status, equals: 200 } ]

thresholds:
  http_req_duration: [ "p(95)<500" ]
  checks: [ "rate>0.99" ]
