# oauth2-minter demo — OAuth2 client-credentials grant feeding a Bearer API call.
#
# HONEST CAVEAT: `oauth2-minter` is a native SERVICE plugin (FfiService:
# start(config) -> bound addr / stop()). loadr 1.24.1 loads service plugins from
# `plugins:` but the run path never calls start() (see
# crates/loadr-cli/src/commands/run.rs — services are collected and stop()ped,
# never started), so the plugin's local token endpoint (bind 127.0.0.1:6470)
# never comes up and a `socket:` request to it gets connection-refused. The
# `services:` block its docs describe is not in the 1.24.1 plan schema either
# (docs/src/plugins/oauth2-minter.md is marked "planned").
#
# So this plan demos the SAME flow the plugin automates — mint a token via the
# client-credentials grant, then spend it as `Authorization: Bearer` — doing the
# grant with plain HTTP steps against the mock IdP. The plugins: entry still
# loads the installed oauth2-minter artifact (proving install + ABI), it just
# cannot serve tokens yet.
name: oauth2-minter-demo
description: OAuth2 client-credentials grant -> Bearer-authed API calls

plugins:
  # Loads the installed native plugin (kind=service). Config matches what the
  # minter will need once core starts service plugins: it would run this grant
  # once, cache the token, refresh it before expiry, and serve it to every VU
  # on 127.0.0.1:6470.
  - name: oauth2-minter
    config:
      token_url: http://127.0.0.1:9999/oauth2/token
      client_id: demo-client
      client_secret: demo-secret
      grant_type: client_credentials
      scope: api.read
      bind: 127.0.0.1:6470

scenarios:
  authed_api:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # The grant the minter would run centrally: POST the client-credentials
      # form to the token endpoint and pull `access_token` out of the JSON.
      - request:
          name: mint token (client_credentials grant)
          method: POST
          url: http://127.0.0.1:9999/oauth2/token
          headers:
            Content-Type: application/x-www-form-urlencoded
          body: "grant_type=client_credentials&client_id=demo-client&client_secret=demo-secret&scope=api.read"
          extract:
            - { type: jsonpath, name: token, expression: "$.access_token" }
          checks:
            - { type: status, equals: 200 }
      # Spend the minted token as a Bearer header on the API under test.
      - request:
          name: authed GET /bearer
          url: http://localhost:8090/bearer
          headers:
            Authorization: "Bearer ${token}"
          checks:
            - { type: status, equals: 200 }

thresholds:
  checks: [ "rate>0.99" ]
