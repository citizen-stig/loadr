name: response-signature-demo
description: >
  Webhook-authenticity gate via the `response-signature` WASM assertion plugin
  (sandboxed wasm32-wasip2 component). The plugin recomputes HMAC-SHA256 over
  each raw response body with the shared secret and compares it — in constant
  time — to the signature carried in a response header (hex or base64, with a
  GitHub-style `sha256=` label tolerated). Backend is the `rig-signer`
  container (127.0.0.1:6493), a tiny webhook server that signs every response
  body with secret `demo`. NOTE: plan-level `assert:`/`checks:` routing to
  assertion *plugins* (`type: plugin`) is not wired into core yet — the plugin
  loads and its ABI is verified at run start — so the checks below perform the
  identical verification live with the built-in `js` check via `crypto.hmac`,
  recomputing the MAC per response exactly as the plugin does in its sandbox.

plugins:
  # The WASM assertion component: loadr verifies the plugin ABI, instantiates
  # the wasmtime sandbox (no filesystem, no network) and registers it
  # (kind = "assertion"). This config is handed to every check() call as JSON:
  # {"header":"x-signature","secret":"demo","algo":"hmac-sha256"}.
  - name: response-signature
    path: ./wasm/loadr_plugin_response_signature.wasm
    config:
      header: x-signature
      secret: demo
      algo: hmac-sha256

defaults:
  http:
    base_url: http://127.0.0.1:6493

scenarios:
  signed_webhooks:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # 1. Plain hex signature — the plugin's default contract: the body is
      #    authentic iff HMAC-SHA256(body, "demo") equals the x-signature hex.
      - request:
          name: signed webhook (hex header)
          url: /signed/webhook
          checks:
            - { type: status, equals: 200 }
            - { type: header, name: signature header present, header: x-signature, exists: true }
            # The plugin's exact verification, recomputed live per response.
            - type: js
              name: hmac-sha256(body) matches x-signature
              expression: "crypto.hmac('sha256', 'demo', response.body, 'hex') === response.headers['x-signature']"
          extract:
            - { type: jsonpath, name: order_id, expression: "$.order.id" }

      # 2. GitHub-webhook style: `x-hub-signature-256: sha256=<hex>` — the
      #    plugin strips the `sha256=` label before decoding; mirrored here.
      - request:
          name: signed webhook (sha256= label)
          url: /signed/github
          checks:
            - { type: status, equals: 200 }
            - type: js
              name: labelled signature matches body
              expression: "'sha256=' + crypto.hmac('sha256', 'demo', response.body, 'hex') === response.headers['x-hub-signature-256']"

      # 3. Tampering is detected: this endpoint signs a DIFFERENT body, so the
      #    recomputed MAC must NOT match — exactly what the plugin fails on.
      - request:
          name: tampered body is rejected
          url: /signed/tampered
          checks:
            - { type: status, equals: 200 }
            - type: js
              name: forged signature detected
              expression: "crypto.hmac('sha256', 'demo', response.body, 'hex') !== response.headers['x-signature']"

      # 4. Forward the verified event downstream (mock sink).
      - request:
          name: relay verified event
          method: POST
          url: http://127.0.0.1:9999/verified-hooks
          body:
            json:
              order_id: "${order_id}"
              signature: verified
              algo: hmac-sha256
          checks:
            - { type: status, equals: 200 }

thresholds:
  checks: [ "rate>0.99" ]
  http_req_failed: [ "rate<0.01" ]
