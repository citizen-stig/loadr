name: db-seeder-demo
description: seed a known DB fixture before the load, read it under load, tear it down after — a known state per run

# Backend (rig-postgres publishes container port 5432 on host 6391, because
# host 5432 is held by another stack):
#   docker run -d --name rig-postgres -p 6391:5432 \
#     -e POSTGRES_USER=loadr -e POSTGRES_PASSWORD=loadr -e POSTGRES_DB=loadr postgres:16-alpine
#
# Verify afterwards — the fixture table is gone again:
#   docker exec rig-postgres psql -U loadr -d loadr -tAc "SELECT to_regclass('demo_products');"   # -> empty
#
# HONEST CAVEAT — db-seeder is a SERVICE plugin: its start() connects to the
# database and applies the `setup` scripts before any VU, and stop() applies
# `teardown` after the last VU retires. loadr 1.24.1 LOADS service plugins
# declared under `plugins:` but the local `loadr run` path never calls their
# start() (only stop(), a safe no-op when never started), so the setup SQL
# below is not executed by the plugin. The plugin entry still exercises
# install + native ABI load and documents the intended config; the same
# seed → verify-under-load → teardown bracket is then reproduced with staged
# scenarios through the `postgres` protocol plugin, so the run really does
# start from a seeded baseline and leave the database clean.

plugins:
  # Loaded (native service ABI) — proves the plugin installs and loads. Config
  # kept as documentation of the intended fixture lifecycle; start() is not
  # invoked by this loadr version, so these scripts run via the scenarios below.
  - name: db-seeder
    config:
      url: postgres://loadr:loadr@127.0.0.1:6391/loadr
      setup:
        - "DROP TABLE IF EXISTS demo_products;"   # inline SQL: idempotent reset
        - sql/db-seeder-seed.sql                  # file: CREATE TABLE + 3 fixture rows
      teardown:
        - "DROP TABLE IF EXISTS demo_products;"   # leave the DB clean afterwards
      on_setup_error: abort                       # broken fixture => run never begins
      transaction: false                          # DDL-friendly; statements apply as they run
      dir: .                                      # base dir for the relative .sql path
  # The SQL protocol plugin that performs the seed/verify/teardown statements.
  - name: postgres

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  # 1. SEED — once, before the load starts: the same statements db-seeder's
  #    start() would apply (sql/db-seeder-seed.sql, split on `;`).
  seed_fixture:
    executor: per-vu-iterations
    vus: 1
    iterations: 1
    flow:
      - request:
          name: reset fixture table
          url: postgres://loadr:loadr@127.0.0.1:6391/loadr
          sql: { query: DROP TABLE IF EXISTS demo_products }
          checks: [ { type: status, equals: 1 } ]      # 1 = ok, 0 = DB error
      - request:
          name: create fixture table
          url: postgres://loadr:loadr@127.0.0.1:6391/loadr
          sql:
            query: CREATE TABLE demo_products (sku text PRIMARY KEY, name text NOT NULL, price numeric(8,2) NOT NULL)
          checks: [ { type: status, equals: 1 } ]
      - request:
          name: insert 3 fixture rows
          url: postgres://loadr:loadr@127.0.0.1:6391/loadr
          sql:
            query: INSERT INTO demo_products (sku, name, price) VALUES ('SKU-001','anvil',49.99), ('SKU-002','dynamite',12.50), ('SKU-003','rocket',199.00)
          checks: [ { type: status, equals: 1 } ]

  # 2. LOAD — starts after the seed; every iteration proves the fixture is
  #    visible while load is running (response body = row count).
  seeded_catalog:
    executor: constant-vus
    vus: 3
    duration: 6s
    start_time: 2s
    flow:
      - request:
          name: fixture rows visible
          url: postgres://loadr:loadr@127.0.0.1:6391/loadr
          sql:
            query: SELECT sku, name, price FROM demo_products ORDER BY sku
          checks:
            - { type: status, equals: 1 }
            - { type: body_contains, name: 3 seeded rows, value: "3" }
      - request:
          name: httpbin get
          url: /get
          checks:
            - { type: status, equals: 200 }

  # 3. TEARDOWN — once, after the load window: what db-seeder's stop() would
  #    run, so consecutive runs never accrete state.
  teardown_fixture:
    executor: per-vu-iterations
    vus: 1
    iterations: 1
    start_time: 9s
    flow:
      - request:
          name: drop fixture table
          url: postgres://loadr:loadr@127.0.0.1:6391/loadr
          sql: { query: DROP TABLE IF EXISTS demo_products }
          checks: [ { type: status, equals: 1 } ]

thresholds:
  checks: [ "rate>0.99" ]
  http_req_failed: [ "rate<0.01" ]
