name: xpath-demo
description: >
  XPath extraction over an XML API. Loads the `xpath` WASM extractor plugin
  (sandboxed wasm32-wasip2 component) and pulls the first <slide><title> out of
  httpbin's /xml slideshow, then replays the extracted value on a second request.
  NOTE: plan-level `extract:` routing to extractor *plugins* is not wired into
  core yet (the plugin loads; docs mark it planned), so the extraction below
  uses loadr's built-in `type: xpath` extractor — the exact engine the plugin
  packages.

plugins:
  # The WASM extractor component: loadr verifies the plugin ABI, instantiates
  # the sandbox and registers it (kind = "extractor").
  - name: xpath
    path: ./wasm/loadr_plugin_xpath.wasm

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  slideshow:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # 1) GET an XML document and extract the first slide title by XPath.
      - request:
          name: fetch slideshow xml
          url: /xml
          extract:
            - { type: xpath, name: slide_title, expression: "//slide/title" }
            - { type: xpath, name: slideshow_author, expression: "/slideshow/@author" }
          checks:
            - { type: status, equals: 200 }
            - { type: body_contains, name: is the slideshow doc, value: "<slideshow" }

      # 2) Replay the extracted values — httpbin echoes request headers back.
      - request:
          name: echo extracted values
          url: /get
          headers:
            X-Slide-Title: "${slide_title}"
            X-Slideshow-Author: "${slideshow_author}"
          checks:
            - { type: status, equals: 200 }
            - { type: body_contains, name: xpath title round-tripped, value: "Wake up to WonderWidgets!" }
            - { type: body_contains, name: xpath attr round-tripped, value: "Yours Truly" }

thresholds:
  checks: [ "rate>0.99" ]
  http_req_failed: [ "rate<0.01" ]
