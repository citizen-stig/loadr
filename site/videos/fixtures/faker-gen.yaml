name: faker-gen-demo
description: generate a synthetic user dataset before the run and feed it to VUs

plugins:
  - name: faker-gen
    config:
      path: data/generated-users.csv
      rows: 500
      seed: 42
      cleanup: false
      columns:
        - { name: id,       type: uuid }
        - { name: username, type: username }
        - { name: email,    type: email }
        - { name: age,      type: int, min: 18, max: 80 }

data:
  users:
    type: csv
    path: data/generated-users.csv
    mode: shared

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  signup:
    executor: constant-vus
    vus: 5
    duration: 6s
    flow:
      - request:
          name: register
          method: POST
          url: /post
          body:
            json: { username: "${data.users.username}", email: "${data.users.email}" }
          checks: [ { type: status, equals: 200 } ]

thresholds:
  checks: [ "rate>0.99" ]
