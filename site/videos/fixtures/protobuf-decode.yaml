name: protobuf-decode-demo
description: >
  Protobuf field extraction from a binary response body. Loads the
  `protobuf-decode` WASM extractor plugin (sandboxed wasm32-wasip2 component;
  hand-rolled wire-format parser, no protoc) with its config
  `{field: 1, kind: string}` — decode the body as a protobuf message and pull
  field 1 as a string. The target returns a real encoded message:
  httpbin's /base64/<b64> echoes the raw bytes of
  `0x0A 0x10 "loadr-order-7841"` (field 1, wire type 2 / length-delimited).
  NOTE: plan-level `extract:` routing to extractor *plugins* is not wired into
  core yet (the plugin loads, is ABI-verified and registered; docs mark the
  integration planned), so the flow below extracts the same field-1 payload
  from the wire bytes with the built-in regex extractor and replays it.

plugins:
  # The WASM extractor component: loadr reads the plugin.toml next to the
  # artifact (kind = "extractor"), verifies the plugin ABI, instantiates the
  # wasmtime sandbox and registers it. The config is merged over the manifest
  # defaults and handed to the plugin on every extract call:
  #   field 1 of the protobuf message, rendered as a UTF-8 string.
  - name: protobuf-decode
    path: ./wasm/protobuf-decode/loadr_plugin_protobuf_decode.wasm
    config:
      field: 1
      kind: string

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  binary-orders:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # 1) GET a binary protobuf body. /base64/<b64> serves the exact bytes
      #    of a tiny message: tag 0x0A (field 1, len-delimited), len 0x10,
      #    then the 16-byte string "loadr-order-7841".
      - request:
          name: fetch protobuf order
          url: /base64/ChBsb2Fkci1vcmRlci03ODQx
          extract:
            # field 1 (string) of the message — the exact value the plugin's
            # {field: 1, kind: string} decode returns for this body.
            - { type: regex, name: order_id, expression: "(loadr-order-[0-9]+)" }
          checks:
            - { type: status, equals: 200 }
            # 0x0A 0x10 prefix = field-1 length-delimited header, len 16.
            - { type: body_contains, name: has field-1 wire payload, value: "loadr-order-7841" }

      # 2) Replay the decoded value — httpbin echoes request headers back,
      #    proving the extracted protobuf field round-trips into ${order_id}.
      - request:
          name: echo decoded field
          url: /get
          headers:
            X-Order-Id: "${order_id}"
          checks:
            - { type: status, equals: 200 }
            - { type: body_contains, name: field 1 round-tripped, value: "loadr-order-7841" }

thresholds:
  checks: [ "rate>0.99" ]
  http_req_failed: [ "rate<0.01" ]
