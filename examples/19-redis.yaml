# Redis (RESP) load test: drive a cache directly with SET / GET / INCR / PING
# over the raw wire protocol. The command for each request goes in `body`, one
# command per request; replies are checked by status (0 = OK, non-zero = RESP
# error) and by their body text. Connections are pooled per virtual user, so a
# VU connects once and reuses the socket for every later command.
#
#   loadr run examples/19-redis.yaml
name: redis
description: SET/GET/INCR/PING against Redis over RESP

scenarios:
  # Steady write/read churn: each VU owns its own session key.
  cache_churn:
    executor: constant-vus
    vus: 20
    duration: 1m
    flow:
      - request:
          name: set session
          url: redis://cache.example.com:6379
          body: "SET session:${vu} active"
          checks:
            - { type: status, equals: 0 }            # +OK, not a RESP error
            - { type: body_contains, value: OK }
      - request:
          name: get session
          url: redis://cache.example.com:6379
          body: "GET session:${vu}"
          checks:
            - { type: body_contains, value: active }
            - { type: size, name: key existed, min: 1 }  # nil reply = empty body
            - { type: duration, name: cache is fast, max: 5ms }
      - request:
          name: expire session
          url: redis://cache.example.com:6379/0
          body: "EXPIRE session:${vu} 60"
          assert:
            - { type: status, equals: 0 }

  # Hot counter: hammer a single INCR key at a fixed rate.
  hot_counter:
    executor: constant-arrival-rate
    rate: 500
    duration: 1m
    pre_allocated_vus: 30
    max_vus: 100
    flow:
      - request:
          name: ping
          url: redis://cache.example.com:6379
          body: "PING"
          checks:
            - { type: body_contains, value: PONG }
      - request:
          name: increment counter
          url: redis://cache.example.com:6379
          body: "INCR page:views"
          assert:
            - { type: status, equals: 0 }
          checks:
            - { type: body_matches, pattern: '^[0-9]+$' }  # integer reply

thresholds:
  checks: [ "rate>0.99" ]
