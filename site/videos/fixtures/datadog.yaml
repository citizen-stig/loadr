name: datadog-demo
description: ship metrics to Datadog (v2 series API), batched with retries

outputs:
  - type: plugin
    name: datadog
    config:
      api_key: demo-key
      url: http://127.0.0.1:9999
      interval: 2s

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  api:
    executor: constant-vus
    vus: 5
    duration: 6s
    flow:
      - request:
          name: get
          url: /get
          checks: [ { type: status, equals: 200 } ]
