name: mqtt-demo
description: publish and subscribe against an MQTT broker through the native mqtt protocol plugin

# Backend:
#   docker run -d --name rig-mqtt -p 1883:1883 eclipse-mosquitto:2 \
#     mosquitto -c /mosquitto-no-auth.conf
# Plugin (native, from the signed index):
#   loadr plugin install mqtt
#
# The mqtt plugin speaks MQTT 3.1.1 over a pooled TCP connection. Each
# request is one operation: a publish (QoS 0 fire-and-forget, QoS 1
# confirmed by PUBACK, QoS 2 through the full PUBREC/PUBREL/PUBCOMP
# handshake) or a subscribe that returns the first delivered message.
# status 0 means the broker really accepted/delivered it; a refusal,
# timeout or transport failure is status 1 with `error` set.

plugins:
  - name: mqtt

scenarios:
  telemetry:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # Fire-and-forget reading (QoS 0): success once the packet is written.
      - request:
          name: publish reading qos0
          url: mqtt://127.0.0.1:1883
          plugin:
            operation: publish
            topic: sensors/${vu}/temperature
            qos: 0
            body: '{"vu": ${vu}, "iteration": ${iteration}, "celsius": 21.5}'
          checks:
            - { type: status, name: reading written, equals: 0 }
      # At-least-once event (QoS 1): the broker's PUBACK confirms it.
      - request:
          name: publish event qos1
          url: mqtt://127.0.0.1:1883
          plugin:
            operation: publish
            topic: events/orders
            qos: 1
            body: '{"vu": ${vu}, "iteration": ${iteration}, "sku": "loadr-tee"}'
          checks:
            - { type: status, name: broker acked the publish, equals: 0 }
      # Exactly-once command (QoS 2): full PUBREC -> PUBREL -> PUBCOMP flow.
      - request:
          name: publish command qos2
          url: mqtt://127.0.0.1:1883
          plugin:
            operation: publish
            topic: commands/valve
            qos: 2
            body: "open vu=${vu} iter=${iteration}"
          checks:
            - { type: status, name: exactly-once handshake completed, equals: 0 }
      # Retained status flag: the broker keeps the last message on the topic...
      - request:
          name: publish retained status
          url: mqtt://127.0.0.1:1883
          plugin:
            operation: publish
            topic: status/device-${vu}
            qos: 1
            retain: true
            body: '{"device": ${vu}, "online": true}'
          checks:
            - { type: status, name: retained status stored, equals: 0 }
      # ...so a fresh subscribe gets it delivered immediately.
      - request:
          name: subscribe retained status
          url: mqtt://127.0.0.1:1883
          plugin:
            operation: subscribe
            topic: status/device-${vu}
            qos: 1
            timeout: 2s
          checks:
            - { type: status, name: message delivered, equals: 0 }
            - { type: body_contains, name: payload round-tripped, value: '"online": true' }

thresholds:
  checks: [ "rate>0.99" ]
  mqtt_reqs: [ "count>0" ]
