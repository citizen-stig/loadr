# aws-sigv4 — pure-Rust AWS Signature Version 4 signer (native service plugin).
#
# The service's start(config) is a one-shot signer: it builds the SigV4
# canonical request for the request described below and returns the
# Authorization / X-Amz-Date / X-Amz-Content-Sha256 headers as JSON.
# Credentials here are the published AWS documentation example keys
# (AKIAIOSFODNN7EXAMPLE) — they are not real credentials.
name: aws-sigv4-demo
description: SigV4-sign an S3-style GET via the aws-sigv4 signer service

plugins:
  - name: aws-sigv4
    config:
      # The request to sign (the AWS S3 "GET Object" SigV4 doc vector).
      method: GET
      url: https://examplebucket.s3.amazonaws.com/test.txt
      region: us-east-1
      service: s3
      headers:
        range: bytes=0-9
      # AWS documentation example credentials (public test vector, not real).
      access_key_id: AKIAIOSFODNN7EXAMPLE
      secret_access_key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  api_reads:
    executor: constant-vus
    vus: 5
    duration: 6s
    flow:
      - request:
          name: get object
          method: GET
          url: /get
          checks:
            - { type: status, equals: 200 }

thresholds:
  checks: [ "rate>0.99" ]
