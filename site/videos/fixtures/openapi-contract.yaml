name: openapi-contract-demo
description: >
  OpenAPI contract assertion via the `openapi-contract` WASM plugin (sandboxed
  wasm32-wasip2 component). Loads the plugin with an inline OpenAPI 3 response
  contract — expected status 200 plus a schema for httpbin's /json slideshow
  document (required properties, string minLength, array minItems, an OpenAPI
  enum and a nullable field). NOTE: plan-level `assert:`/`checks:` routing to
  assertion *plugins* (`type: plugin`) is not wired into core yet (the plugin
  loads and its ABI is verified; docs mark it planned), so the checks below
  mirror the identical contract with loadr's built-in assertions — the exact
  validation the plugin performs in its sandbox.

plugins:
  # The WASM assertion component: loadr verifies the plugin ABI, instantiates
  # the wasmtime sandbox (no filesystem, no network) and registers it
  # (kind = "assertion"). The config — expected status + OpenAPI schema — is
  # handed to every check() call as JSON.
  - name: openapi-contract
    path: ./wasm/loadr_plugin_openapi_contract.wasm
    config:
      status: 200
      schema:
        type: object
        required: [slideshow]
        properties:
          slideshow:
            type: object
            required: [author, title, slides]
            properties:
              author: { type: string, minLength: 1 }
              title: { type: string, minLength: 1 }
              date: { type: string, nullable: true }   # OpenAPI 3.0 nullable
              slides:
                type: array
                minItems: 1
                items:
                  type: object
                  required: [title, type]
                  properties:
                    title: { type: string, minLength: 1 }
                    type: { enum: [all, widget] }

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  contract_check:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # GET the /json operation and gate the response on its *contract*,
      # mirroring the plugin's config: expected status + body schema.
      - request:
          name: GET /json (contract)
          url: /json
          checks:
            # contract: status must equal the documented 200.
            - { type: status, name: "contract: status 200", equals: 200 }
            # schema: required [slideshow] and required nested properties.
            - { type: jsonpath, name: "required: $.slideshow", expression: "$.slideshow", exists: true }
            - { type: jsonpath, name: "required: $.slideshow.author", expression: "$.slideshow.author", equals: "Yours Truly" }
            - { type: jsonpath, name: "required: $.slideshow.title", expression: "$.slideshow.title", equals: "Sample Slide Show" }
            # schema: slides is an array with minItems 1 — element 0 exists...
            - { type: jsonpath, name: "minItems: slides[0] present", expression: "$.slideshow.slides[0].title", exists: true }
            # ...and each element honours required [title, type] + the enum.
            - { type: jsonpath, name: "enum: slides[0].type in [all, widget]", expression: "$.slideshow.slides[0].type", equals: "all" }
            - { type: jsonpath, name: "enum: slides[1].type in [all, widget]", expression: "$.slideshow.slides[1].type", equals: "all" }

thresholds:
  checks: [ "rate>0.99" ]
  http_req_failed: [ "rate<0.01" ]
