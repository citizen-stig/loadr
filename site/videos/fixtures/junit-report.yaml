name: junit-report-demo
description: JUnit XML report of checks + thresholds via the junit-report plugin

plugins:
  - name: junit-report
    config:
      path: junit-plugin-report.xml

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  api:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      - request:
          name: get
          url: /get
          checks: [ { type: status, equals: 200 } ]
      - request:
          name: json
          url: /json
          checks: [ { type: status, equals: 200 } ]

thresholds:
  http_req_duration: [ "p(95)<500" ]
  checks: [ "rate>0.99" ]
