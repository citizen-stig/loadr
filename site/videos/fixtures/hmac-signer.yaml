# hmac-signer demo — HMAC-SHA256 signed requests (GitHub-webhook style header).
#
# HONEST CAVEAT: `hmac-signer` is a native SERVICE plugin (FfiService:
# start(config) -> bound addr / stop()). loadr 1.24.1 loads service plugins
# from `plugins:` but the run path never calls start() (see
# crates/loadr-cli/src/commands/run.rs — services are collected and stop()ped,
# never started), so the plugin's local signer endpoint (bind 127.0.0.1:6471)
# never comes up and a `socket:` request to it gets connection-refused. There
# is no `sign:` request field in the 1.24.1 core either (the docs page is
# marked "planned").
#
# So this plan demos the SAME signature the plugin computes — HMAC-SHA256 over
# the canonical string `{method}{path}{body}`, hex-encoded with a `sha256=`
# prefix, stamped as `x-signature` — using loadr's built-in JS crypto.hmac.
# The plugins: entry still loads the installed hmac-signer artifact (proving
# install + ABI), it just cannot serve signatures yet. The check pins the
# exact known-good vector, so the math here matches the plugin bit-for-bit.
name: hmac-signer-demo
description: HMAC-SHA256 request signatures over {method}{path}{body}

plugins:
  # Loads the installed native plugin (kind=service). Config matches what the
  # signer will need once core starts service plugins: it would bind
  # 127.0.0.1:6471, take one canonical line per request and reply
  # {"header":"x-signature","value":"sha256=<hex>"}.
  - name: hmac-signer
    config:
      secret: demo-shared-secret
      algo: sha256              # sha256 | sha512
      encoding: hex             # hex | base64
      prefix: "sha256="         # GitHub-webhook style value prefix
      header: x-signature
      template: "{method}{path}{body}"
      bind: 127.0.0.1:6471

scenarios:
  signed_api:
    executor: constant-vus
    vus: 5
    duration: 6s
    flow:
      # The signature the plugin would return for this request: HMAC-SHA256
      # over METHOD + path + body, hex, "sha256=" prefix — identical math.
      - js: |
          session.vars.order = JSON.stringify({ sku: 'abc', qty: 1 });
          const canonical = 'POST' + '/anything/orders' + session.vars.order;
          session.vars.sig =
            'sha256=' + crypto.hmac('sha256', 'demo-shared-secret', canonical, 'hex');
      # Stamp it on the request; httpbin echoes the header back in the body.
      - request:
          name: signed post
          method: POST
          url: http://localhost:8090/anything/orders
          headers:
            X-Signature: "${sig}"
            Content-Type: application/json
          body: "${order}"
          checks:
            - { type: status, equals: 200 }
            # Known-good vector: HMAC-SHA256("demo-shared-secret",
            # 'POST/anything/orders{"sku":"abc","qty":1}').
            - { type: body_contains, name: signature stamped + correct,
                value: "sha256=fc7321a8bd91431b9663e2abdf56a8ad5edb89c4227d0b4df2e9eb0eba4a68a8" }

thresholds:
  checks: [ "rate>0.99" ]
