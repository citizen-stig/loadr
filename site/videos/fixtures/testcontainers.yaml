# testcontainers demo — throwaway per-run container fixtures declared in the plan.
#
# The plugin (native SERVICE, `loadr plugin install testcontainers`) talks to the
# Docker Engine API on /var/run/docker.sock: start() creates + starts each
# declared container, waits for its readiness gate, publishes the mapped host
# port as LOADR_TC_<IMAGE>_<PORT>, and stop() force-removes everything it
# created (idempotent, with rollback on partial failure).
#
# HONEST CAVEAT — loadr 1.24.1 LOADS service plugins declared under `plugins:`
# but the local `loadr run` path never calls their start() (services are only
# stop()ped at the end — see crates/loadr-cli/src/commands/run.rs), so the
# redis:7-alpine below is NOT started by the plugin in this version and
# ${env.LOADR_TC_REDIS_6379} is never exported. The plugins: entry still
# exercises install + native ABI load and documents the real config schema
# (verified against plugins/loadr-plugin-testcontainers/src/lib.rs). The
# scenario therefore targets the demo rig's own redis:7-alpine — the exact
# container this config declares — started out-of-band:
#   docker run -d --name rig-redis -p 6390:6379 redis:7-alpine
name: testcontainers-demo
description: declare per-run Docker container fixtures (redis:7-alpine) in the plan

plugins:
  # Loaded (native service ABI) — proves install + load. Once core starts
  # service plugins, this stands up a fresh redis:7-alpine for the run, waits
  # for its log line, exports the ephemeral host port as
  # LOADR_TC_REDIS_6379, and removes the container after the last VU retires.
  - name: testcontainers
    config:
      containers:
        - image: redis:7-alpine
          port: 6379                              # -> ${env.LOADR_TC_REDIS_6379}
          wait: "log:Ready to accept connections" # readiness gate, not just "running"
      startup_timeout: 60s

scenarios:
  # Drive the redis the plugin would have stood up: a raw RESP inline PING on
  # the container's published port answers "+PONG".
  cache:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      - request:
          name: redis PING (container fixture)
          url: tcp://127.0.0.1:6390
          socket:
            send_text: "PING\r\n"   # RESP inline command; one read gets "+PONG\r\n"
            read_timeout: 2s
          checks:
            - { type: body_contains, value: "PONG" }
      - request:
          name: api under test
          url: http://localhost:8090/get
          checks:
            - { type: status, equals: 200 }

thresholds:
  checks: [ "rate>0.99" ]
