name: webhook-demo
description: POST run snapshots + summary as JSON to any HTTP endpoint

outputs:
  - type: plugin
    name: webhook
    config:
      url: http://127.0.0.1:9999/loadr-hook
      headers: { X-Source: loadr }
      interval: 2s

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  api:
    executor: constant-vus
    vus: 5
    duration: 6s
    flow:
      - request:
          name: get
          url: /get
          checks: [ { type: status, equals: 200 } ]

thresholds:
  checks: [ "rate>0.99" ]
