name: data-cleanup-demo
description: every row the run creates is cleaned up with a parameterised SQL DELETE — the table ends as it began

# Backend (rig-postgres publishes container port 5432 on host 6391, because
# host 5432 is held by another stack):
#   docker run -d --name rig-postgres -p 6391:5432 \
#     -e POSTGRES_USER=loadr -e POSTGRES_PASSWORD=loadr -e POSTGRES_DB=loadr postgres:16-alpine
#   docker exec rig-postgres psql -U loadr -d loadr -c \
#     "CREATE TABLE IF NOT EXISTS loadr_tmp (id text PRIMARY KEY, payload text, created_at timestamptz DEFAULT now());"
#
# Verify afterwards — no leaked rows:
#   docker exec rig-postgres psql -U loadr -d loadr -tAc "SELECT count(*) FROM loadr_tmp;"   # -> 0
#
# HONEST CAVEAT — data-cleanup is a SERVICE plugin: its start() validates the
# cleanup strategy, opens the SQL pool and binds a local tracking endpoint
# (here 127.0.0.1:6473); VUs write each created id to it, and stop() drains
# the registry with one `DELETE FROM loadr_tmp WHERE id = $1` per id after the
# last VU retires. loadr 1.24.1 LOADS service plugins declared under
# `plugins:` but the local `loadr run` path never calls their start() (only
# stop(), which is a safe no-op when never started), so the tracking endpoint
# never binds. The plugin entry below still exercises install + native ABI
# load; the flow then performs the plugin's exact cleanup call — the same
# parameterised DELETE, id bound as $1, never interpolated — through the
# `postgres` protocol plugin, so the run still returns the shared table to the
# state it was in before the run.

plugins:
  # Loaded (native service ABI) — proves the plugin installs and loads. Config
  # kept as documentation of the intended cleanup service; start() is not
  # invoked by this loadr version, so nothing binds on 127.0.0.1:6473.
  - name: data-cleanup
    config:
      strategy: sql
      url: postgres://loadr:loadr@127.0.0.1:6391/loadr
      table: loadr_tmp
      key: id                    # DELETE FROM loadr_tmp WHERE id = $1
      concurrency: 4
      continue_on_error: true
      bind: 127.0.0.1:6473
  # The SQL protocol plugin used to create rows — and to issue the same
  # parameterised cleanup DELETE the service would fire at run end.
  - name: postgres

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  create_and_cleanup:
    executor: constant-vus
    vus: 3
    duration: 6s
    flow:
      # 1. Create a real resource: one uniquely-id'd row per iteration.
      - request:
          name: create tmp row
          url: postgres://loadr:loadr@127.0.0.1:6391/loadr
          sql:
            query: INSERT INTO loadr_tmp (id, payload) VALUES ($1, $2) ON CONFLICT (id) DO NOTHING
            params: ["loadr:tmp:${vu}-${iteration}", "created by vu ${vu}"]
          checks:
            - { type: status, equals: 1 }        # 1 = ok, 0 = DB error
      # 2. The actual load: a short httpbin hit alongside the bookkeeping.
      - request:
          name: httpbin get
          url: /get
          checks:
            - { type: status, equals: 200 }
      # 3. Clean up the created resource — the exact statement data-cleanup's
      #    stop() issues per tracked id: parameterised, id bound as $1.
      - request:
          name: cleanup tmp row
          url: postgres://loadr:loadr@127.0.0.1:6391/loadr
          sql:
            query: DELETE FROM loadr_tmp WHERE id = $1
            params: ["loadr:tmp:${vu}-${iteration}"]
          checks:
            - { type: status, equals: 1 }

thresholds:
  checks: [ "rate>0.99" ]
