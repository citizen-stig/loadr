name: s3-archive-demo
description: Archive the finished run report as a gzip object in S3 (MinIO)

# Credentials come from the standard AWS env vars:
#   AWS_ACCESS_KEY_ID=minioadmin AWS_SECRET_ACCESS_KEY=minioadmin loadr run s3-archive.yaml
# Backend: rig-minio (MinIO on http://127.0.0.1:9000, bucket `loadr-reports`).
# After the run: docker exec rig-minio mc ls --recursive local/loadr-reports/

plugins:
  - name: s3-archive
    config:
      bucket: loadr-reports
      key_prefix: runs/
      region: us-east-1
      endpoint: http://127.0.0.1:9000
      compression: gzip

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  api:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      - request:
          name: get
          url: /get
          checks: [ { type: status, equals: 200 } ]
      - request:
          name: json
          url: /json
          checks: [ { type: status, equals: 200 } ]

thresholds:
  checks: [ "rate>0.99" ]
