name: otlp-metrics-demo
description: Export per-second run snapshots as OTLP metrics to an OTLP/HTTP collector

# Output plugin: converts each 1s snapshot into an OTLP ExportMetricsServiceRequest
# and POSTs it to <endpoint>/v1/metrics (counters -> monotonic Sums, gauges/rates ->
# Gauges, trends -> one Gauge per quantile: .avg/.p95/.p99/...).
plugins:
  - name: otlp-metrics
    config:
      endpoint: http://127.0.0.1:9999           # plugin appends /v1/metrics
      encoding: json                            # or `protobuf` (the default)
      service_name: loadr-demo
      resource_attributes: { deployment.environment: demo }
      headers: { X-Source: loadr }

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  api:
    executor: constant-vus
    vus: 5
    duration: 6s
    flow:
      - request:
          name: get
          url: /get
          checks: [ { type: status, equals: 200 } ]

thresholds:
  checks: [ "rate>0.99" ]
