name: sql-feeder-demo
description: a live Postgres SELECT becomes a data feeder — DB rows drive VU requests via ${data.users.*}

# Backend + seed (rig-postgres publishes container port 5432 on host 6391):
#   docker run -d --name rig-postgres -e POSTGRES_USER=loadr -e POSTGRES_PASSWORD=loadr \
#     -e POSTGRES_DB=loadr -p 6391:5432 postgres:16
#   docker exec rig-postgres psql -U loadr -d loadr -c "
#     CREATE TABLE demo_users (id serial PRIMARY KEY, email text, plan text, active boolean);
#     INSERT INTO demo_users (email, plan, active) VALUES
#       ('ada@example.com','pro',true), ('grace@example.com','free',true),
#       ('linus@example.com','pro',true), ('margaret@example.com','team',true),
#       ('alan@example.com','free',false);"
#
# Export step — the exact file sql-feeder's start() writes (rows as a JSON
# array, column names as keys), produced here with psql:
#   docker exec rig-postgres psql -U loadr -d loadr -t -A -c \
#     "select coalesce(json_agg(t),'[]'::json) from \
#      (select id, email, plan from demo_users where active order by id) t" \
#     > data/users-from-db.json
#
# HONEST CAVEAT — sql-feeder is a native SERVICE plugin (FfiService:
# start(config) runs the SELECT once and writes `output`; stop() after the
# run). loadr 1.24.1 LOADS service plugins declared under `plugins:` but the
# local run path never calls their start() (crates/loadr-cli/src/commands/
# run.rs collects services and only stop()s them), so the plugin cannot write
# the feeder file itself yet. The plugins: entry below still exercises
# install + native ABI load; the psql export above performs the plugin's
# exact startup step, and the flow proves the same table is live by running
# the same SELECT in-flow through the `postgres` protocol plugin.

plugins:
  # Loaded (native service ABI) — proves the plugin installs and loads.
  # Config kept as documentation of the intended feeder; start() is not
  # invoked by this loadr version, so the export is done by the seed step.
  - name: sql-feeder
    config:
      url: postgres://loadr:loadr@127.0.0.1:6391/loadr
      query: select id, email, plan from demo_users where active order by id
      output: data/users-from-db.json
  # The Postgres protocol plugin, used in-flow to show the feeder rows come
  # from a real, live database.
  - name: postgres

data:
  # The feeder file the service writes at startup (here: the psql export).
  # Every VU draws the next live-database row via ${data.users.<column>}.
  users:
    type: json
    path: data/users-from-db.json
    mode: shared
    pick: sequential
    on_eof: recycle

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  profile_replay:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # The exact SELECT the feeder runs at startup, live against the same
      # table — proving the rows VUs spend below exist in the database now.
      - request:
          name: live SELECT (the feeder query)
          url: postgres://loadr:loadr@127.0.0.1:6391/loadr
          sql:
            query: select id, email, plan from demo_users where active order by id
          checks:
            - { type: status, name: query ok, equals: 1 }   # 1 = ok, 0 = DB error
      # Spend a DB-sourced row: real ids/emails/plans from the live table,
      # without ever exporting a CSV into the repo by hand.
      - request:
          name: fetch profile for db-sourced user
          method: GET
          url: /get?user_id=${data.users.id}&plan=${data.users.plan}
          headers: { X-User-Email: "${data.users.email}" }
          checks:
            - { type: status, equals: 200 }
            - { type: body_contains, name: db email echoed back, value: "@example.com" }

thresholds:
  checks: [ "rate>0.99" ]
