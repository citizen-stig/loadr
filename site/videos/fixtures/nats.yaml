name: nats-demo
description: publish events onto a NATS subject through the native nats protocol plugin

# Backend:
#   docker run -d --name rig-nats -p 4222:4222 nats:alpine
# Plugin (native, from the signed index):
#   loadr plugin install nats
#
# The nats plugin speaks the NATS line protocol over a pooled TCP socket.
# Each request is one exchange: a PUB followed by a PING/PONG flush, so
# status 0 means the server really accepted the message (a -ERR, timeout
# or connection failure is status 1 with `error` set).

plugins:
  - name: nats

scenarios:
  publish:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # Fire-and-forget publish, confirmed by the server before it counts.
      - request:
          name: publish order event
          url: nats://127.0.0.1:4222
          plugin:
            operation: publish
            subject: orders.created
            body: '{"vu": ${vu}, "iteration": ${iteration}, "sku": "loadr-tee"}'
          checks:
            - { type: status, name: server accepted the publish, equals: 0 }
      # A bare PUB carrying a reply-to subject (the pattern behind req/reply).
      - request:
          name: publish with reply-to
          url: nats://127.0.0.1:4222
          plugin:
            operation: publish
            subject: orders.audit
            reply_to: audit.receipts
            body: "audit vu=${vu} iter=${iteration}"
          checks:
            - { type: status, name: audit publish flushed, equals: 0 }

thresholds:
  checks: [ "rate>0.99" ]
  nats_reqs: [ "count>0" ]
