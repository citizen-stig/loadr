# Marketplace entry point: `uses: levantar-ai/loadr@v1`.
#
# loadr is a monorepo, so this root action is the canonical, Marketplace-listed
# "run a load test" action. It is SELF-CONTAINED: it inlines the install + run
# logic rather than delegating to .github/actions/run via a local `uses: ./…`.
# A published composite action cannot reference a sibling action by local path —
# GitHub resolves `./…` against the CONSUMER'S checkout, not this repo, so the
# delegating form fails with "Can't find action.yml under
# <consumer>/.github/actions/run". The subdirectory action
# (`levantar-ai/loadr/.github/actions/run@v1`) is the same logic and still works.
#
# Baseline comparison: pass `baseline-summary` (a JSON summary exported by a
# previous run) and, after the test, the action runs `loadr compare` against
# this run's summary, writes a markdown report to `compare-markdown`, upserts
# it as a single PR comment (found by the `<!-- loadr-compare -->` marker;
# `comment-pr: 'false'` or a non-pull_request event skips it), and fails the
# job when a regression exceeds its tolerance — unless `fail-on-regression`
# is 'false'. `max-regression` takes whitespace-separated `field=limit` specs
# (e.g. `p95=10% error_rate=0.5 http_req_duration.p99=25`); without a spec the
# compare command's defaults gate p95/p99/error_rate/pass_rate at 5%. The
# `regression` output is 'true'/'false' whenever a comparison ran, regardless
# of `fail-on-regression`. Commenting needs `pull-requests: write` on the
# calling job.
name: loadr load test
description: >-
  Run a loadr load test in CI. Installs loadr, runs a test plan, writes a JUnit
  XML report + JSON summary, and fails the job when a threshold is breached.
  Optionally diffs the run against a baseline summary and comments the
  comparison on the pull request.
author: levantar-ai

branding:
  icon: activity
  color: purple

inputs:
  plan:
    description: Path to the loadr test plan (YAML).
    required: true
  version:
    description: 'loadr version to install (a tag like "v1.21.5", or "latest").'
    required: false
    default: latest
  bin:
    description: >-
      Path to a preinstalled loadr binary. When set, the download is skipped and
      this binary is used (handy for self-hosted runners that already ship loadr).
    required: false
    default: ''
  junit:
    description: Path to write the JUnit XML report.
    required: false
    default: loadr-junit.xml
  summary:
    description: Path to write the JSON summary export.
    required: false
    default: loadr-summary.json
  args:
    description: Extra arguments passed verbatim to `loadr run`.
    required: false
    default: ''
  fail-on-threshold:
    description: >-
      When 'true' (default) a breached threshold fails the step. Set 'false' to
      record results without failing the job.
    required: false
    default: 'true'
  baseline-summary:
    description: >-
      Path to a baseline JSON summary from a previous run. When set, the action
      runs `loadr compare` between it and this run's summary.
    required: false
    default: ''
  compare-markdown:
    description: Path to write the baseline comparison as markdown.
    required: false
    default: loadr-compare.md
  max-regression:
    description: >-
      Whitespace-separated regression tolerances, passed to `loadr compare` as
      repeated `--max-regression` flags (e.g. 'p95=10% error_rate=0.5').
    required: false
    default: ''
  fail-on-regression:
    description: >-
      When 'true' (default) a regression beyond tolerance fails the job — after
      the PR comment is posted. Set 'false' to record the comparison without
      failing.
    required: false
    default: 'true'
  comment-pr:
    description: >-
      When 'true' (default) the comparison markdown is upserted as a single PR
      comment. Only acts on pull_request events.
    required: false
    default: 'true'

outputs:
  passed:
    description: "'true' when every threshold passed and the run was not aborted."
    value: ${{ steps.run.outputs.passed }}
  exit-code:
    description: The exit code from `loadr run`.
    value: ${{ steps.run.outputs.exit_code }}
  junit:
    description: Path to the JUnit XML report.
    value: ${{ inputs.junit }}
  summary:
    description: Path to the JSON summary.
    value: ${{ inputs.summary }}
  regression:
    description: >-
      'true' when the baseline comparison found a regression beyond tolerance,
      'false' when it ran clean; empty when no baseline-summary was given.
    value: ${{ steps.compare.outputs.regression }}
  comparison:
    description: Path to the comparison markdown (when baseline-summary is set).
    value: ${{ inputs.compare-markdown }}

runs:
  using: composite
  steps:
    - name: Install loadr
      shell: bash
      env:
        LOADR_VERSION: ${{ inputs.version }}
        LOADR_PREINSTALLED: ${{ inputs.bin }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        repo="levantar-ai/loadr"
        # A preinstalled binary short-circuits the download.
        if [ -n "${LOADR_PREINSTALLED}" ]; then
          if [ ! -x "${LOADR_PREINSTALLED}" ]; then
            echo "::error::bin '${LOADR_PREINSTALLED}' is not an executable file"; exit 1
          fi
          echo "Using preinstalled loadr at ${LOADR_PREINSTALLED}"
          echo "$(cd "$(dirname "${LOADR_PREINSTALLED}")" && pwd)" >> "$GITHUB_PATH"
          "${LOADR_PREINSTALLED}" --version || true
          exit 0
        fi
        os="$(uname -s)"; arch="$(uname -m)"
        case "$os" in
          Linux)  triple_os="unknown-linux-gnu"; ext="tar.gz" ;;
          Darwin) triple_os="apple-darwin";       ext="tar.gz" ;;
          MINGW*|MSYS*|CYGWIN*|Windows_NT) triple_os="pc-windows-msvc"; ext="zip" ;;
          *) echo "::error::unsupported OS: $os"; exit 1 ;;
        esac
        case "$arch" in
          x86_64|amd64) triple_arch="x86_64" ;;
          arm64|aarch64) triple_arch="aarch64" ;;
          *) echo "::error::unsupported arch: $arch"; exit 1 ;;
        esac
        if [ "$triple_os" = "pc-windows-msvc" ]; then triple_arch="x86_64"; fi
        asset="loadr-${triple_arch}-${triple_os}.${ext}"
        if [ "${LOADR_VERSION}" = "latest" ] || [ -z "${LOADR_VERSION}" ]; then
          base="https://github.com/${repo}/releases/latest/download"
          tag="$(gh release view --repo "$repo" --json tagName -q .tagName 2>/dev/null || echo latest)"
        else
          tag="${LOADR_VERSION}"
          base="https://github.com/${repo}/releases/download/${tag}"
        fi
        echo "Installing loadr ${tag} (${asset})"
        dest="${RUNNER_TEMP:-/tmp}/loadr-install"
        mkdir -p "$dest"
        curl --fail --location --retry 3 --silent --show-error -o "${dest}/${asset}" "${base}/${asset}"
        if [ "$ext" = "zip" ]; then
          unzip -o -q "${dest}/${asset}" -d "$dest"
          bin="$(find "$dest" -name 'loadr.exe' -type f | head -n1)"
        else
          tar -xzf "${dest}/${asset}" -C "$dest"
          bin="$(find "$dest" -name 'loadr' -type f | head -n1)"
        fi
        if [ -z "$bin" ]; then echo "::error::loadr binary not found in $asset"; exit 1; fi
        chmod +x "$bin" || true
        echo "$(dirname "$bin")" >> "$GITHUB_PATH"
        "$bin" --version || true

    - id: run
      shell: bash
      env:
        PLAN: ${{ inputs.plan }}
        JUNIT: ${{ inputs.junit }}
        SUMMARY: ${{ inputs.summary }}
        EXTRA: ${{ inputs.args }}
        FAIL_ON_THRESHOLD: ${{ inputs.fail-on-threshold }}
      run: |
        set -uo pipefail
        # shellcheck disable=SC2086
        loadr run "$PLAN" \
          --junit "$JUNIT" \
          --summary-export "$SUMMARY" \
          $EXTRA
        code=$?
        echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
        if [ "$code" -eq 0 ]; then
          echo "passed=true" >> "$GITHUB_OUTPUT"
        else
          echo "passed=false" >> "$GITHUB_OUTPUT"
        fi
        if [ "$code" -ne 0 ] && [ "$FAIL_ON_THRESHOLD" = "true" ]; then
          echo "::error::loadr run failed (exit ${code}); see ${JUNIT}"
          exit "$code"
        fi

    - name: Compare against the baseline
      id: compare
      if: inputs.baseline-summary != ''
      shell: bash
      env:
        BASELINE: ${{ inputs.baseline-summary }}
        SUMMARY: ${{ inputs.summary }}
        MD: ${{ inputs.compare-markdown }}
        MAX_REGRESSION: ${{ inputs.max-regression }}
      run: |
        set -uo pipefail
        # Always `--assert` so the exit code carries the verdict (99 on
        # regression); failing the job is deferred to the step below so the
        # PR comment lands first and `fail-on-regression: false` still yields
        # an accurate `regression` output.
        cmd=(loadr compare "$BASELINE" "$SUMMARY" --markdown "$MD" --assert)
        # Tolerance specs never contain whitespace, so word-splitting is safe.
        for spec in $MAX_REGRESSION; do
          cmd+=(--max-regression "$spec")
        done
        "${cmd[@]}"
        code=$?
        echo "exit_code=${code}" >> "$GITHUB_OUTPUT"
        if [ "$code" -eq 99 ]; then
          echo "regression=true" >> "$GITHUB_OUTPUT"
        elif [ "$code" -eq 0 ]; then
          echo "regression=false" >> "$GITHUB_OUTPUT"
        else
          # Not a verdict — unreadable summaries and the like fail right away.
          echo "::error::loadr compare failed (exit ${code})"
          exit "$code"
        fi

    - name: Comment the comparison on the PR
      if: >-
        inputs.baseline-summary != '' && inputs.comment-pr == 'true' &&
        github.event_name == 'pull_request'
      uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
      env:
        MD: ${{ inputs.compare-markdown }}
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- loadr-compare -->';
          const body = `${marker}\n${fs.readFileSync(process.env.MD, 'utf8')}`;
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }

    - name: Fail on regression
      if: >-
        inputs.baseline-summary != '' && inputs.fail-on-regression == 'true' &&
        steps.compare.outputs.regression == 'true'
      shell: bash
      env:
        BASELINE: ${{ inputs.baseline-summary }}
        MD: ${{ inputs.compare-markdown }}
      run: |
        echo "::error::performance regression beyond tolerance vs ${BASELINE}; see ${MD}"
        exit 99
