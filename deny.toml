[advisories]
version = 2
ignore = [
    # Unmaintained transitive deps with no upgrade path yet. Advisory-only
    # (no known vulnerability); revisit when upstreams publish replacements.
    "RUSTSEC-2024-0014", # generational-arena (via the browser/chromiumoxide stack)
    "RUSTSEC-2024-0436", # paste (proc-macro, pulled in transitively)
    "RUSTSEC-2025-0134", # rustls-pemfile (superseded by rustls-pki-types)
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
# The workspace's own crates depend on each other by `path` with no version
# requirement (resolves to `*`). Permit wildcards for path deps only; crates.io
# deps still must be pinned.
allow-wildcard-paths = true

[licenses]
version = 2
# Allow common permissive licenses; this is a proprietary binary, deps must be permissive.
# Elastic-2.0 is loadr's own source license (workspace crates inherit it via license-file).
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-2-Clause", "BSD-3-Clause", "ISC", "Unicode-3.0", "Zlib", "MPL-2.0", "CC0-1.0", "Unlicense", "CDLA-Permissive-2.0", "Elastic-2.0"]
confidence-threshold = 0.9
private = { ignore = true }

[sources]
unknown-registry = "deny"
unknown-git = "deny"
