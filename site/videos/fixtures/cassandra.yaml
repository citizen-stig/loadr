name: cassandra-demo
description: read/write a Cassandra table through the native cassandra protocol plugin (CQL v4)

# Backend:
#   docker run -d --name rig-cass -p 9042:9042 cassandra:5
#   # slow startup: wait until `docker exec rig-cass cqlsh -e "describe cluster"` works
#   docker exec rig-cass cqlsh -e "
#     CREATE KEYSPACE IF NOT EXISTS demo
#       WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
#     CREATE TABLE IF NOT EXISTS demo.events (
#       vu int, iter int, kind text, PRIMARY KEY (vu, iter));"
# Plugin (native, from the signed index):
#   loadr plugin install cassandra
#
# The cassandra plugin speaks the CQL v4 binary protocol over a pooled TCP
# socket. The URL selects the node and session keyspace
# (cql://host[:port]/keyspace); the statement, positional `?` params and
# consistency level come from the request's plugin: block. status 1 means
# the statement executed; a CQL error or transport failure is status 0
# with `error` set. The response body is the row count as text.

plugins:
  - name: cassandra

scenarios:
  events:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # Upsert one event row per iteration (positional binds, type-inferred).
      - request:
          name: write event
          url: cql://127.0.0.1:9042/demo
          plugin:
            query: "INSERT INTO events (vu, iter, kind) VALUES (?, ?, ?)"
            params: ["${vu}", "${iteration}", "order-created"]
            consistency: one
          checks:
            - { type: status, name: insert executed, equals: 1 }
      # Read the row straight back from this VU's partition.
      - request:
          name: read event back
          url: cql://127.0.0.1:9042/demo
          plugin:
            query: "SELECT kind FROM events WHERE vu = ? AND iter = ?"
            params: ["${vu}", "${iteration}"]
          checks:
            - { type: status, name: select executed, equals: 1 }
            - { type: body_contains, name: exactly one row came back, value: "1" }
      # No query key: the request body IS the CQL statement (cluster metadata).
      - request:
          name: node version via body statement
          url: cql://127.0.0.1:9042/demo
          body: "SELECT release_version FROM system.local"
          checks:
            - { type: status, name: system.local answered, equals: 1 }

thresholds:
  checks: [ "rate>0.99" ]
  cassandra_reqs: [ "count>0" ]
