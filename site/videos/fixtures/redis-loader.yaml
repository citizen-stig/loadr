name: redis-loader-demo
description: shared test data (emails) drawn round-robin from a Redis list feed

# Backend + seed (rig-redis publishes container port 6379 on host 6390,
# because host 6379 is held by another demo stack):
#   docker run -d --name rig-redis -p 6390:6379 redis:7-alpine
#   docker exec rig-redis redis-cli RPUSH loadr:emails a@x.com b@x.com c@x.com
#
# HONEST CAVEAT — redis-loader is a SERVICE plugin: on start() it connects to
# Redis and binds a local line endpoint (e.g. 127.0.0.1:6472) that VUs read
# values from over tcp://. loadr 1.24.1 LOADS service plugins declared under
# `plugins:` but the local `loadr run` path never calls their start() (only
# stop()), so the feeder endpoint is never bound. The plugin entry below still
# exercises install + native ABI load; the flow then performs the plugin's
# exact cycle-mode draw — LMOVE key key LEFT RIGHT — through the `redis`
# protocol plugin against the same seeded list, so the demo shows the same
# shared round-robin feed the service would serve.

plugins:
  # Loaded (native service ABI) — proves the plugin installs and loads.
  # Config kept as documentation of the intended feeder; start() is not
  # invoked by this loadr version, so nothing binds on 127.0.0.1:6472.
  - name: redis-loader
    config:
      url: redis://127.0.0.1:6390
      key: loadr:emails
      source: list
      mode: cycle          # rotate the same pool forever (LMOVE key key LEFT RIGHT)
      bind: 127.0.0.1:6472
  # The RESP protocol plugin used to perform the same draw directly.
  - name: redis

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  signups:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # Draw the next shared email: the exact command redis-loader's `cycle`
      # mode issues — rotate head to tail and hand the value out, so the
      # 3-email pool feeds every VU round-robin and never runs out.
      - request:
          name: draw shared email (cycle)
          url: redis://127.0.0.1:6390
          plugin:
            command: ["LMOVE", "loadr:emails", "loadr:emails", "LEFT", "RIGHT"]
          extract:
            - { type: regex, name: email, expression: "([a-z]+@x\\.com)" }
          checks:
            - { type: status, equals: 0 }
            - { type: body_contains, name: feed served an email, value: "@x.com" }
      # Spend the drawn value in a real request.
      - request:
          name: signup with drawn email
          method: POST
          url: /post
          headers: { Content-Type: application/json }
          body: '{"email":"${email}","source":"redis-feed"}'
          checks:
            - { type: status, equals: 200 }
            - { type: body_contains, name: email echoed back, value: "@x.com" }
      # The pool is intact after every rotation: still exactly 3 entries.
      - request:
          name: pool never drains
          url: redis://127.0.0.1:6390
          plugin:
            command: ["LLEN", "loadr:emails"]
          checks:
            - { type: body_contains, name: three emails remain, value: "3" }

thresholds:
  checks: [ "rate>0.99" ]
