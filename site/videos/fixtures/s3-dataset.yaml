name: s3-dataset-demo
description: a CSV object in a bucket becomes the VU data feed — fetched once, served from memory

# Backend + seed (MinIO, S3-compatible, path-style on 127.0.0.1:9000; the
# running rig-minio uses minioadmin/minioadmin credentials):
#   docker run -d --name rig-minio -p 9000:9000 \
#     -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
#     quay.io/minio/minio server /data
#   docker exec -i rig-minio sh -c 'mc alias set local http://127.0.0.1:9000 minioadmin minioadmin && \
#     mc mb --ignore-existing local/datasets && cat > /tmp/u.csv && \
#     mc cp /tmp/u.csv local/datasets/users.csv && \
#     mc anonymous set download local/datasets' < data/s3-users.csv
#
# The exact config below is VERIFIED against this MinIO: a SigV4 GET of
# s3://datasets/users.csv (path-style, region us-east-1) returns the object.
#
# HONEST CAVEAT — s3-dataset is a SERVICE plugin: start() runs once before any
# VU, fetches the object over HTTP with a pure-Rust SigV4 signature, parses the
# CSV into rows and returns them for a `data:` feeder. loadr 1.24.1 LOADS
# service plugins declared under `plugins:` (install + native ABI load are
# exercised) but the local `loadr run` path never calls their start(), and the
# `data: type: service` feeder wiring is not in core yet. So this demo performs
# the plugin's exact cycle honestly: the flow GETs the very same object from
# the bucket (the fetch start() would do), and the VUs draw rows from a CSV
# feeder holding the identical rows the plugin would have materialised.

plugins:
  # Loaded (native service ABI) — proves the plugin installs and loads. The
  # config documents the intended dataset and is real: endpoint/bucket/key/
  # region/credentials all resolve against the running rig-minio.
  - name: s3-dataset
    config:
      endpoint: http://127.0.0.1:9000   # path-style, S3-compatible (MinIO)
      bucket: datasets
      key: users.csv
      region: us-east-1                 # SigV4 signing region
      access_key_id: minioadmin
      secret_access_key: minioadmin
      format: csv

data:
  # The rows the plugin would return from start(): same file that was uploaded
  # as s3://datasets/users.csv — columns bind as ${data.users.<column>}.
  users:
    type: csv
    path: data/s3-users.csv
    mode: shared
    pick: sequential
    on_eof: recycle

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  dataset_driven:
    executor: constant-vus
    vus: 4
    duration: 6s
    flow:
      # 1. The plugin's fetch, live: GET the object from the bucket at the
      #    exact path-style URL resolve_target() builds
      #    (http://127.0.0.1:9000/datasets/users.csv) — proving the dataset
      #    really lives in S3-compatible storage, not in the repo.
      - request:
          name: fetch dataset object from bucket
          method: GET
          url: http://127.0.0.1:9000/datasets/users.csv
          checks:
            - { type: status, equals: 200 }
            - { type: body_contains, name: csv header row present, value: "id,email,plan" }
            - { type: body_contains, name: dataset rows present, value: "ada@example.com" }
      # 2. Spend a dataset row: each VU draws the next user from the bucket's
      #    CSV and drives a real request with it — the feeder shape the plugin
      #    produces (${data.users.email} / ${data.users.plan}).
      - request:
          name: login with dataset user
          method: POST
          url: /post
          headers: { Content-Type: application/json }
          body: '{"email":"${data.users.email}","plan":"${data.users.plan}","source":"s3-dataset"}'
          checks:
            - { type: status, equals: 200 }
            - { type: body_contains, name: dataset email echoed back, value: "@example.com" }

thresholds:
  checks: [ "rate>0.99" ]
  http_req_failed: [ "rate<0.01" ]
