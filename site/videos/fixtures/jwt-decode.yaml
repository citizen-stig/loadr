# jwt-decode — decode a JWT payload and correlate a claim into the next request.
#
# The `jwt-decode` WASM extractor plugin (kind: extractor) is installed from the
# local build tree and loaded below under `plugins:` — it decodes a JWT's
# payload segment (base64url, no verification) and returns a named claim.
#
# HONEST STATUS (loadr 1.24.1): extractor plugins load, but the plan-side
# `extract: { type: plugin, ... }` entry is not wired into the config schema
# yet (the docs mark jwt-decode as "planned"). Until that lands, this fixture
# performs the identical decode with the JS engine (data/jwt-decode.js) so the
# flow is real: fetch a JWT, pull the `sub` and `name` claims out of its
# payload, and chain them into the next request, asserted end-to-end.
#
# Token: the canonical jwt.io HS256 example ({sub: 1234567890, name: John Doe}).
# go-httpbin's /base64/<b64url> endpoint serves it back as a plain-text body,
# playing the part of a login endpoint that returns a bearer token.
#
#   loadr run jwt-decode.yaml
name: jwt-decode
description: Decode JWT claims from a token response and chain them onward

plugins:
  # The real WASM extractor — loads from ~/.loadr/plugins/jwt-decode/ (installed
  # via `loadr plugin install <dist-dir>`). Default claim: sub.
  - name: jwt-decode
    config: { claim: sub }

js:
  file: data/jwt-decode.js
  timeout: 5s

defaults:
  http:
    base_url: http://localhost:8090

scenarios:
  decode_claims:
    executor: constant-vus
    vus: 3
    duration: 6s
    flow:
      # "Login": the response body is a bare JWT (header.payload.signature).
      - request:
          name: fetch-token
          url: /base64/ZXlKaGJHY2lPaUpJVXpJMU5pSXNJblI1Y0NJNklrcFhWQ0o5LmV5SnpkV0lpT2lJeE1qTTBOVFkzT0Rrd0lpd2libUZ0WlNJNklrcHZhRzRnUkc5bElpd2lhV0YwSWpveE5URTJNak01TURJeWZRLlNmbEt4d1JKU01lS0tGMlFUNGZ3cE1lSmYzNlBPazZ5SlZfYWRRc3N3NWM=
          extract:
            # Grab the raw JWT off the body — three base64url segments.
            - { type: regex, name: jwt, expression: "([A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+\\.[A-Za-z0-9_-]+)" }
          checks:
            - { type: status, equals: 200 }

      - think_time: { type: uniform, min: 100ms, max: 300ms }

      # Decode the payload segment and chain the claims into the next call:
      # `sub` becomes the path, `name` rides along as a header.
      - request:
          name: whoami
          url: "/anything/users/${js: jwtClaim(session.vars.jwt, 'sub')}"
          headers:
            Authorization: "Bearer ${jwt}"
            X-Token-Name: "${js: jwtClaim(session.vars.jwt, 'name')}"
          checks:
            - { type: status, equals: 200 }
            # httpbin echoes the request — prove the decoded sub landed in the URL...
            - { type: jsonpath, name: sub claim decoded, expression: "$.url", equals: "http://localhost:8090/anything/users/1234567890" }
            # ...and the decoded name claim in the header we sent.
            - { type: jsonpath, name: name claim decoded, expression: "$.headers['X-Token-Name'][0]", equals: "John Doe" }

thresholds:
  checks: [ "rate>0.99" ]
